[main]
launch-prefix = /home/qasim/.local/bin/fuzzel-uwsm
font = Monaspace Neon NF SemiBold:size=15
dpi-aware = auto
prompt = " "
fields = name,generic,comment,categories,filename,keywords
width = 30
lines = 5
horizontal-pad = 20
vertical-pad = 20
inner-pad = 10
line-height = 30
match-mode = fzf

[border]
radius = 0
width = 2

[colors]
background = 000000cc
text = cdd6f4ff
prompt = bac2deff
placeholder = 7f849cff
input = cdd6f4ff
match = f9e2afff
selection = cba6f7ff
selection-text = 000000ff
selection-match = 000000ff
counter = 7f849cff
border = cba6f7ff
